name: Validate YouTube Video IDs

on:
  push:
    branches: [main]
    paths:
      - 'src/data/games.ts'
      - 'src/data/__tests__/games.test.ts'
  pull_request:
    paths:
      - 'src/data/games.ts'
      - 'src/data/__tests__/games.test.ts'

jobs:
  validate-video-ids:
    name: Validate YouTube video IDs are embeddable
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run YouTube video ID validation tests
        run: npm test
